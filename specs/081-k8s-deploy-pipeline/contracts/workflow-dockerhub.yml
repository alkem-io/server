name: Deploy to DockerHub

on:
  release:
    types: [published]

jobs:
  docker:
    runs-on: [self-hosted, m4]
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Docker meta (runtime image)
        id: meta-runtime
        uses: docker/metadata-action@v6.0.0
        with:
          images: alkemio/${{ github.event.repository.name }}
          tags: |
            type=semver,pattern=v{{version}}
            type=semver,pattern=v{{major}}.{{minor}}
            type=semver,pattern=v{{major}}
            type=raw,value=latest,enable=${{ github.event.release.prerelease == false }}

      - name: Docker meta (migration image)
        id: meta-migration
        uses: docker/metadata-action@v6.0.0
        with:
          images: alkemio/${{ github.event.repository.name }}-migration
          tags: |
            type=semver,pattern=v{{version}}
            type=semver,pattern=v{{major}}.{{minor}}
            type=semver,pattern=v{{major}}
            type=raw,value=latest,enable=${{ github.event.release.prerelease == false }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0

      - name: Login to DockerHub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4.0.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push runtime image
        uses: docker/build-push-action@v7.0.0
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta-runtime.outputs.tags }}
          labels: ${{ steps.meta-runtime.outputs.labels }}

      - name: Build and push migration image
        uses: docker/build-push-action@v7.0.0
        with:
          context: .
          file: ./Dockerfile.migration
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta-migration.outputs.tags }}
          labels: ${{ steps.meta-migration.outputs.labels }}
