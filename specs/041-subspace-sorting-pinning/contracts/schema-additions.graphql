# GraphQL Schema Additions for Subspace Sorting & Pinning
# All changes are ADDITIVE (non-breaking)

# ─── New Enum ──────────────────────────────────────────────

enum SpaceSortMode {
  ALPHABETICAL
  CUSTOM
}

# ─── Modified Types (new fields only) ─────────────────────

# Added to existing Space type:
# type Space {
#   ...existing fields...
#   pinned: Boolean!                    # NEW
# }

# Added to existing SpaceSettings type:
# type SpaceSettings {
#   ...existing fields...
#   sortMode: SpaceSortMode!            # NEW
# }

# ─── New Input Type ───────────────────────────────────────

"""Input for pinning or unpinning a subspace within a parent Space."""
input UpdateSubspacePinnedInput {
  """The ID of the parent Space containing the subspace."""
  spaceID: UUID!

  """The ID of the subspace to pin or unpin."""
  subspaceID: UUID!

  """Whether the subspace should be pinned (true) or unpinned (false)."""
  pinned: Boolean!
}

