http:
  services:
    rabbitmq-management:
      loadBalancer:
        servers:
          - url: 'http://rabbitmq:15672'

    mailslurper-client:
      loadBalancer:
        servers:
          - url: 'http://mailslurper:4436'

    mailslurper-api:
      loadBalancer:
        servers:
          - url: 'http://mailslurper:4437'

    alkemio-server:
      loadBalancer:
        servers:
          - url: 'http://host.docker.internal:4000/'

    alkemio-web-client:
      loadBalancer:
        servers:
          - url: 'http://host.docker.internal:3001/'

    hydra:
      loadBalancer:
        servers:
          - url: 'http://hydra:4444/'

    hydra-admin:
      loadBalancer:
        servers:
          - url: 'http://hydra:4445/'

    oidc-service:
      loadBalancer:
        servers:
          - url: 'http://oidc-service:8080/'

    kratos-hooks:
      loadBalancer:
        servers:
          - url: 'http://kratos-hooks:8080/'

    kratos-public:
      loadBalancer:
        servers:
          - url: 'http://kratos:4433/'

    kratos-admin:
      loadBalancer:
        servers:
          - url: 'http://kratos:4434/'

    kratos-admin-ui:
      loadBalancer:
        servers:
          - url: 'http://kratos-admin-ui:8080/'

    oathkeeper-proxy:
      loadBalancer:
        servers:
          - url: 'http://oathkeeper:4455/'
        serversTransport: oathkeeper-transport@file

    oathkeeper-admin:
      loadBalancer:
        servers:
          - url: 'http://oathkeeper:4456/'

    synapse:
      loadBalancer:
        servers:
          - url: 'http://synapse:8008/'

    synapse-admin:
      loadBalancer:
        servers:
          - url: 'http://synapse-admin:80/'

    whiteboard-collaboration:
      failover:
        service: whiteboard-collaboration-local
        fallback: whiteboard-collaboration-compose

    whiteboard-collaboration-compose:
      loadBalancer:
        servers:
          - url: 'http://whiteboard-collaboration:4002/'
        healthCheck:
          path: /health
          port: 4005
          interval: 10s
          timeout: 3s
          scheme: http

    # Fallback: host loopback for `npm run dev` local-whiteboard workflow.
    # Receives traffic only when the primary is unhealthy. Same /health
    # contract.
    whiteboard-collaboration-local:
      loadBalancer:
        servers:
          - url: 'http://host.docker.internal:4002/'
        healthCheck:
          path: /health
          port: 4005
          interval: 10s
          timeout: 3s
          scheme: http

    collaborative-document:
      loadBalancer:
        servers:
          - url: 'http://collaborative-document:4004/'

    authorization-evaluation:
      loadBalancer:
        servers:
          - url: 'h2c://authorization-evaluation:6060/'

    wopi-service:
      loadBalancer:
        servers:
          - url: 'http://wopi-service:8080/'

    collabora:
      loadBalancer:
        servers:
          - url: 'http://collabora:9980/'

    file-service:
      loadBalancer:
        servers:
          - url: 'h2c://file-service:4003/'

  middlewares:
    strip-api-private-non-interactive-prefix:
      stripPrefix:
        prefixes:
          - /api/private/non-interactive
        forceSlash: false

    strip-api-private-prefix:
      stripPrefix:
        prefixes:
          - /api/private
        forceSlash: false

    strip-api-private-prefix-socket-io:
      stripPrefix:
        prefixes:
          - /api/private/ws
        forceSlash: false

    strip-api-public-prefix:
      stripPrefix:
        prefixes:
          - /api/public
        forceSlash: false

    strip-kratos-prefix:
      stripPrefix:
        prefixes:
          - /ory/kratos
        forceSlash: false

    strip-kratos-public-prefix:
      stripPrefix:
        prefixes:
          - /ory/kratos/public
        forceSlash: false

    strip-oathkeeper-jwks-prefix:
      stripPrefix:
        prefixes:
          - /jwks
        forceSlash: false

    strip-hydra-admin-prefix:
      stripPrefix:
        prefixes:
          - /hydra/admin
        forceSlash: false

    oathkeeper-auth-socket-io:
      forwardAuth:
        address: 'http://oathkeeper:4456/decisions'
        authResponseHeaders:
          - Authorization

    # strips any client-supplied X-Alkemio-* identity
    # headers before the request reaches the upstream. MUST run before
    # `alkemio-resolve` on any router that uses it.
    strip-client-alkemio-headers:
      headers:
        customRequestHeaders:
          X-Alkemio-Actor-Id: ""
          X-Alkemio-Actor-Name: ""
          X-Alkemio-Session-Id: ""

    # Universal traefik forwardAuth decision endpoint. alkemio-server's
    # AuthenticationService resolves the alkemio_session cookie (or the
    # `?guestName=` query param for guest paths) to a canonical ActorContext
    # and emits its `actorID`:
    #   - authenticated user → X-Alkemio-Actor-Id: <real actor id>
    #   - guest with name    → X-Alkemio-Actor-Id: guest-<uuid>
    #   - anonymous          → header absent
    # Always returns 200; per-route policy decides what missing-header means.
    alkemio-resolve:
      forwardAuth:
        address: 'http://host.docker.internal:4000/api/auth/resolve'
        authResponseHeaders:
          - X-Alkemio-Actor-Id
        trustForwardHeader: true

  routers:
    oidc-public:
      rule: 'PathPrefix(`/oidc`)'
      service: 'oidc-service'
      entryPoints:
        - 'web'
      priority: 130

    api-auth-oidc:
      rule: 'PathPrefix(`/api/auth`)'
      service: 'alkemio-server'
      entryPoints:
        - 'web'
      priority: 145

    hydra-public:
      rule: 'PathPrefix(`/.well-known/`) || PathPrefix(`/oauth2/`)'
      service: 'hydra'
      entryPoints:
        - 'web'
      priority: 100

    # Hydra Admin API accessible via /hydra for alkemio-server
    hydra-admin-web:
      rule: 'PathPrefix(`/hydra/admin`)'
      service: 'hydra-admin'
      middlewares:
        - strip-hydra-admin-prefix
      entryPoints:
        - 'web'
      priority: 99

    # Hydra Admin API (internal use only - not exposed via 'web' entryPoint)
    hydra-admin-internal:
      rule: 'PathPrefix(`/`)'
      service: 'hydra-admin'
      entryPoints:
        - 'hydra-admin'

    # Class-A partial pre-cutover (MVP scope L1; user-authorised 2026-05-07
    # via opt-1, see specs/003-alkemio-oidc-idp/mvp-scope.md). graphql /
    # graphiql go direct to alkemio-server; the server validates cookie +
    # Hydra-bearer in-process per Phase 4. Oathkeeper hop on these paths was
    # dead weight post-T042b. Phase 7 remains parked for B1+B2+B3+B4.
    graphql:
      rule: 'PathPrefix(`/graphql`)'
      service: 'alkemio-server'
      entryPoints:
        - 'web'

    graphiql:
      rule: 'PathPrefix(`/graphiql`)'
      service: 'alkemio-server'
      entryPoints:
        - 'web'

    api-public-graphql:
      rule: 'PathPrefix(`/api/public/graphql`)'
      service: 'alkemio-server'
      middlewares:
        - strip-api-public-prefix
      entryPoints:
        - 'web'

    api-public-rest:
      rule: 'PathPrefix(`/api/public/rest`)'
      service: 'alkemio-server'
      middlewares:
        - strip-api-public-prefix
      entryPoints:
        - 'web'

    # Class-A partial pre-cutover — see comment on `graphql` router above.
    api-private-graphql:
      rule: 'PathPrefix(`/api/private/graphql`)'
      service: 'alkemio-server'
      middlewares:
        - strip-api-private-prefix
      entryPoints:
        - 'web'

    api-private-non-interactive-graphql:
      rule: 'PathPrefix(`/api/private/non-interactive/graphql`)'
      service: 'alkemio-server'
      middlewares:
        - strip-api-private-non-interactive-prefix
      entryPoints:
        - 'web'

    api-private-non-interactive-rest:
      rule: 'PathPrefix(`/api/private/non-interactive/rest`)'
      service: 'alkemio-server'
      middlewares:
        - strip-api-private-non-interactive-prefix
      entryPoints:
        - 'web'

    whiteboard-collaboration:
      rule: 'PathPrefix(`/api/private/ws`)'
      service: 'whiteboard-collaboration'
      middlewares:
        - strip-api-private-prefix-socket-io
        - strip-client-alkemio-headers
        - alkemio-resolve
      entryPoints:
        - 'web'

    collaborative-document:
      rule: 'PathPrefix(`/api/private/hocuspocus`)'
      service: 'oathkeeper-proxy'
      middlewares:
        - strip-api-private-prefix
      entryPoints:
        - 'web'

    # more specific than 'api-private-rest'
    file-service:
      rule: 'PathPrefix(`/api/private/rest/storage`)'
      service: 'oathkeeper-proxy'
      middlewares:
        - strip-api-private-prefix
      entryPoints:
        - 'web'

    # file-service-go internal endpoints.
    # Placed on the public `web` entrypoint in the dev compose stack so the
    # server (running on the host) can reach file-service via Traefik on
    # localhost:3000. Production K8s deployments expose these endpoints only
    # inside the cluster — the file-service Service is cluster-internal there
    # and is never reachable from outside. This router's exposure is a dev
    # convenience; do not replicate it in production manifests.
    file-service-internal:
      rule: 'PathPrefix(`/internal/file`)'
      service: 'file-service'
      entryPoints:
        - 'web'
      priority: 160

    # file-service-go health endpoint
    file-service-health:
      rule: 'Path(`/file-service/health`)'
      service: 'file-service'
      entryPoints:
        - 'web'
      priority: 160

    # Login backoff proxy: intercepts login submissions for brute-force protection
    kratos-login-backoff:
      rule: 'PathPrefix(`/ory/kratos/public/self-service/login`)'
      service: 'kratos-hooks'
      middlewares:
        - strip-kratos-public-prefix
      entryPoints:
        - 'web'
      priority: 200

    # Class-A partial pre-cutover — see comment on `graphql` router above.
    calendar-event-ics:
      rule: 'PathPrefix(`/api/private/rest/calendar`)'
      service: 'alkemio-server'
      middlewares:
        - strip-api-private-prefix
      entryPoints:
        - 'web'
      priority: 150

    kratos-public:
      rule: 'PathPrefix(`/ory/kratos/public`)'
      service: 'kratos-public'
      middlewares:
        - strip-kratos-public-prefix
      entryPoints:
        - 'web'

    kratos-admin:
      rule: 'PathPrefix(`/ory/kratos/admin`)'
      service: 'kratos-admin'
      middlewares:
        - strip-kratos-prefix
      entryPoints:
        - 'web'

    kratos-admin-ui:
      rule: 'PathPrefix(`/`)'
      service: 'kratos-admin-ui'
      entryPoints:
        - 'kratos-admin-ui'

    alkemiowebroute:
      rule: 'PathPrefix(`/`)'
      service: 'alkemio-web-client'
      entryPoints:
        - 'web'

    kratos-hooks:
      rule: 'PathPrefix(`/api/v1/webhooks`)'
      service: 'kratos-hooks'
      entryPoints:
        - 'web'
      priority: 140

    oathkeeper-jwks:
      rule: 'PathPrefix(`/jwks`)'
      service: 'oathkeeper-admin'
      middlewares:
        - strip-oathkeeper-jwks-prefix
      entryPoints:
        - 'web'

    synapse:
      rule: 'PathPrefix(`/`)'
      service: 'synapse'
      entryPoints:
        - 'synapse'

    synapse-admin:
      rule: 'PathPrefix(`/`)'
      service: 'synapse-admin'
      entryPoints:
        - 'synapse-admin'

    mailslurper-api:
      rule: 'PathPrefix(`/`)'
      service: 'mailslurper-api'
      entryPoints:
        - 'mailslurper-api'

    mailslurper-client:
      rule: 'PathPrefix(`/`)'
      service: 'mailslurper-client'
      entryPoints:
        - 'mailslurper-client'

    authorization-evaluation:
      rule: 'PathPrefix(`/`)'
      service: 'authorization-evaluation'
      entryPoints:
        - 'auth-evaluation'

    # WOPI token issuance (through Oathkeeper for JWT auth)
    wopi-token:
      rule: 'PathPrefix(`/api/private/wopi/token`)'
      service: 'oathkeeper-proxy'
      middlewares:
        - strip-api-private-prefix
      entryPoints:
        - 'web'
      priority: 155

    # WOPI protocol endpoints (direct, opaque token auth — same domain as Collabora)
    wopi-protocol:
      rule: 'PathPrefix(`/wopi`)'
      service: 'wopi-service'
      entryPoints:
        - 'web'
      priority: 145

    # Collabora Online editor (browser, discovery, cool paths)
    collabora:
      rule: 'PathPrefix(`/browser`) || PathPrefix(`/hosting/discovery`) || PathPrefix(`/hosting/capabilities`) || PathPrefix(`/cool`)'
      service: 'collabora'
      entryPoints:
        - 'web'
      priority: 140

    rabbitmq-management:
      rule: 'PathPrefix(`/`)'
      service: 'rabbitmq-management'
      entryPoints:
        - 'rabbitmq-management'

  serversTransports:
    oathkeeper-transport:
      forwardingTimeouts:
        responseHeaderTimeout: 120s
        idleConnTimeout: 120s

tcp:
  services:
    postgres:
      loadBalancer:
        servers:
          - address: 'postgres:5432'

    rabbitmq-amqp:
      loadBalancer:
        servers:
          - address: 'rabbitmq:5672'

    mailslurper-smtp:
      loadBalancer:
        servers:
          - address: 'mailslurper:1025'

    redis:
      loadBalancer:
        servers:
          - address: 'redis:6379'

    matrix-adapter:
      loadBalancer:
        servers:
          - address: 'matrix-adapter:8280'

  routers:
    postgres:
      rule: 'HostSNI(`*`)'
      service: 'postgres'
      entryPoints:
        - 'postgres'

    rabbitmq-amqp:
      rule: 'HostSNI(`*`)'
      service: 'rabbitmq-amqp'
      entryPoints:
        - 'rabbitmq-amqp'

    mailslurper-smtp:
      rule: 'HostSNI(`*`)'
      service: 'mailslurper-smtp'
      entryPoints:
        - 'mailslurper-smtp'

    redis:
      rule: 'HostSNI(`*`)'
      service: 'redis'
      entryPoints:
        - 'redis'

    matrix-adapter:
      rule: 'HostSNI(`*`)'
      service: 'matrix-adapter'
      entryPoints:
        - 'matrix-adapter'
