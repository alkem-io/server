version: v26.2.0

dsn: memory

serve:
  public:
    base_url: http://localhost:3000/ory/kratos/public
    cors:
      enabled: true
  admin:
    base_url: http://kratos:4434/

selfservice:
  default_browser_return_url: http://localhost:3000/
  allowed_return_urls:
    - http://localhost:3000

  methods:
    link:
      enabled: true
    password:
      enabled: true
      # to enable & configure read https://hackmd.io/yXMYkiK9QHq4sJGWcGlwQA
    oidc:
      enabled: true
      config:
        providers:
          - id: linkedin
            provider: linkedin_v2
            client_id: 775c24tex2bnn8
            client_secret: RWqM6Qaa1H3QIZo9
            mapper_url: file:///etc/config/kratos/oidc/oidc.linkedin.jsonnet
            scope:
              - openid
              - profile
              - email
          - id: microsoft # this is `<provider-id>` in the Authorization callback URL. DO NOT CHANGE IT ONCE SET!
            provider: microsoft
            client_id: 1045418f-c674-44d5-808c-060922be5a4a # This is the the Application (client) ID from the App Registration
            client_secret: DmF8Q~NgphrDHoXpIYhtD_ZbSkQDb8LOgYlKyaj. # This is the generated Secret value from the App Registration
            microsoft_tenant: d7cd650f-6063-4276-8982-07e68da3c582 # This allows you to select the tenant.
            subject_source: userinfo  # Pin to 'sub' claim via userinfo — v26.2.0 defaults to 'oid', which would orphan existing Microsoft-linked identities
            mapper_url: file:///etc/config/kratos/oidc/oidc.microsoft.jsonnet
            # Alternatively, use an URL:
            # mapper_url: https://storage.googleapis.com/abc-cde-prd/9cac9717f007808bf17f22ce7f4295c739604b183f05ac4afb4
            scope:
              - profile
              - email
          - id: github
            provider: github
            client_id: Ov23lizFYULcSqONM2wR
            client_secret: d8859d62246220dc3434f3d43e4ee6de54d9e021
            mapper_url: file:///etc/config/kratos/oidc/oidc.github.jsonnet
            scope:
              - user:email
    passkey:
      enabled: true
      config:
        rp:
          id: localhost
          display_name: Alkemio
          origins:
            - http://localhost:3000
            - http://localhost:3001

  flows:
    error:
      ui_url: http://localhost:3000/error

    settings:
      ui_url: http://localhost:3000/settings
      privileged_session_max_age: 15m
      after:
        default_browser_return_url: http://localhost:3000
        password:
          hooks:
            # Password-changed signal (spec 005): route the self-service
            # password change through the Go kratos-webhooks service, which
            # publishes USER_PASSWORD_CHANGED to RabbitMQ for the server
            # consumer. response.ignore: true keeps the user's settings flow
            # fail-open if the hook is unavailable.
            - hook: web_hook
              config:
                url: http://kratos-hooks:8080/api/v1/webhooks/kratos/password-changed
                method: POST
                body: file:///etc/config/kratos/password-changed.jsonnet
                response:
                  ignore: true
                  parse: false

    recovery:
      enabled: true
      use: link
      ui_url: http://localhost:3000/recovery
      after:
        default_browser_return_url: http://localhost:3000
        hooks:
          - hook: web_hook
            config:
              url: http://oidc-service:8080/webhooks/kratos/post-login
              method: POST
              body: file:///etc/config/kratos/alkemio-claims.jsonnet
              response:
                ignore: false
                parse: true

    verification:
      enabled: true
      use: link  # Explicitly use 'link' method — v26.2.0 defaults to 'code' which auto-creates a session after verification, breaking the registration→verify→login flow
      ui_url: http://localhost:3000/verify
      after:
        default_browser_return_url: http://localhost:3000/login
        hooks:
          - hook: web_hook
            config:
              url: http://oidc-service:8080/webhooks/kratos/post-login
              method: POST
              body: file:///etc/config/kratos/alkemio-claims.jsonnet
              response:
                ignore: false
                parse: false   # We update via Admin API
          - hook: web_hook
            config:
              url: http://kratos-hooks:8080/api/v1/webhooks/kratos/verification
              method: POST
              body: file:///etc/config/kratos/kratos-hooks-verification.jsonnet
              response:
                ignore: true
                parse: false

    logout:
      after:
        default_browser_return_url: http://localhost:3000

    login:
      ui_url: http://localhost:3000/login
      lifespan: 10m
      after:
        default_browser_return_url: http://localhost:3000/login/success
        password:
          hooks:
            - hook: require_verified_address
            - hook: web_hook
              config:
                url: http://oidc-service:8080/webhooks/kratos/post-login
                method: POST
                body: file:///etc/config/kratos/alkemio-claims.jsonnet
                response:
                  ignore: false
                  parse: true
            - hook: web_hook
              config:
                url: http://kratos-hooks:8080/api/v1/webhooks/kratos/login-backoff/after-login
                method: POST
                body: file:///etc/config/kratos/login-backoff-after.jsonnet
                response:
                  ignore: true
        passkey:
          hooks:
            - hook: require_verified_address
            - hook: web_hook
              config:
                url: http://oidc-service:8080/webhooks/kratos/post-login
                method: POST
                body: file:///etc/config/kratos/alkemio-claims.jsonnet
                response:
                  ignore: false
                  parse: true
        oidc:
          hooks:
            - hook: web_hook
              config:
                url: http://oidc-service:8080/webhooks/kratos/post-login
                method: POST
                body: file:///etc/config/kratos/alkemio-claims.jsonnet
                response:
                  ignore: false
                  parse: true

    registration:
      lifespan: 10m
      ui_url: http://localhost:3000/registration
      after:
        password:
          default_browser_return_url: http://localhost:3000/registration/success
        oidc:
          default_browser_return_url: http://localhost:3000
          hooks:
            - hook: web_hook
              config:
                url: http://oidc-service:8080/webhooks/kratos/post-login
                method: POST
                body: file:///etc/config/kratos/alkemio-claims.jsonnet
                response:
                  ignore: false
                  parse: false
            - hook: session

session:
  # Sized so the Kratos SSO session never dies BEFORE the OIDC BFF session.
  # The reference point is the BFF's absolute cap (alkemio.yml absolute_ttl_s =
  # 2592000s = 720h = 30d), not its 14d idle window: an actively-used
  # alkemio_session slides that idle window forward on every
  # /api/private/graphql call, up to the 30d cap. At 48h Kratos expired first,
  # so the header's whoami-based login indicator flipped to "logged out" while
  # the still-valid alkemio_session kept authorizing CRUD (client-web#9965).
  #
  # Note these are NOT a shared deadline. Kratos' lifespan is a rolling window
  # with no absolute cap: once a session is within earliest_possible_extend of
  # expiring, the next /sessions/whoami can renew it to now + lifespan. So a
  # Kratos session can outlive the BFF's 30d cap — harmless, because the BFF
  # session is the authoritative gate for both API access and the login
  # indicator (client-web#10053); Kratos alone never reads as logged in.
  # Mirrors the prod/infra base values (720h / 360h).
  lifespan: 720h
  earliest_possible_extend: 360h

log:
  level: debug
  format: text
  leak_sensitive_values: true

secrets:
  cookie:
    - PLEASE-CHANGE-ME-I-AM-VERY-INSECURE

hashers:
  argon2:
    parallelism: 1
    memory: 128MB
    iterations: 2
    salt_length: 16
    key_length: 16

# From Kratos 0.9.0 schemas are now versioned.
# see Breaking Changes of https://github.com/ory/kratos/blob/master/CHANGELOG.md#090-alpha1-2022-03-21
identity:
  default_schema_id: default
  schemas:
    - id: default
      url: file:///etc/config/kratos/identity.schema.json

courier:
  smtp:
    connection_uri: smtps://test:test@mailslurper:1025/?skip_ssl_verify=true&legacy_ssl=true
    from_name: Team Alkemio
    from_address: info@alkem.io
  template_override_path: /etc/config/kratos/courier-templates
