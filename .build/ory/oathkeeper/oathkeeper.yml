log:
  level: debug
  format: json
  leak_sensitive_values: true

serve:
  proxy:
    trust_forwarded_headers: true  # Required for v26.2.0: trust Traefik's X-Forwarded-* headers (CVE-2026-33495 fix strips ALL X-Forwarded-* when untrusted)
    timeout:
      read: 120s
      write: 120s
      idle: 120s
    cors:
      enabled: true
      allowed_origins:
        - "http://localhost:3000"
      allowed_methods:
        - POST
        - GET
        - PUT
        - PATCH
        - DELETE
      allowed_headers:
        - Authorization
        - Content-Type
      exposed_headers:
        - Content-Type
      allow_credentials: true
      debug: true

errors:
  fallback:
    - json

  handlers:
    redirect:
      enabled: true
      config:
        to: http://localhost:3000/login
        when:
          - error:
              - unauthorized
              - forbidden
            request:
              header:
                accept:
                  - text/html
    json:
      enabled: true
      config:
        verbose: true

access_rules:
  matching_strategy: glob
  repositories:
    - file:///etc/config/oathkeeper/access-rules.yml

authenticators:
  anonymous:
    enabled: true
    config:
      subject: guest

  # Note: Oathkeeper v26.2.0 maps Kratos 429 (rate limit) to 401 — server cannot distinguish from genuine auth failure
  bearer_token:
    enabled: true
    config:
      check_session_url: http://kratos:4433/sessions/whoami
      preserve_path: true
      extra_from: "@this"
      subject_from: "identity.id"
      token_from:
        header: Authorization
      forward_http_headers:
        - Authorization
        - X-Forwarded-For
        - X-Forwarded-Proto
        - X-Real-Ip
        - True-Client-Ip
        - X-Request-ID
        - x-alkemio-hub
        - X-Geo

  cookie_session:
    enabled: true
    config:
      check_session_url: http://kratos:4433/sessions/whoami
      preserve_path: true
      extra_from: "@this"
      subject_from: "identity.id"
      only:
        - ory_kratos_session
      forward_http_headers:
        - Cookie
        - X-Forwarded-For
        - X-Forwarded-Proto
        - X-Real-Ip
        - True-Client-Ip
        - X-Request-ID
        - x-alkemio-hub
        - X-Geo

  noop:
    enabled: true

authorizers:
  allow:
    enabled: true

mutators:
  noop:
    enabled: true

  id_token:
    enabled: true
    config:
      issuer_url: http://alkemio-server-dev/
      jwks_url: file:///etc/config/oathkeeper/id_token.jwks.json
      ttl: 1h
      claims: |
        {
          "session": {{ .Extra | toJson }},
          "alkemio_actor_id": "{{ if .Extra.identity }}{{ if .Extra.identity.metadata_public }}{{ .Extra.identity.metadata_public.alkemio_actor_id }}{{ end }}{{ end }}"
        }
