server {
    listen 80;
    resolver 127.0.0.11 valid=10s;

    # Rewrite Azure-style: /openai/deployments/{model}/chat/completions
    location ~ ^(/v1)?/openai/deployments/(?<deployment>[^/]+)/chat/completions$ {
        access_by_lua_block {
            ngx.req.read_body()
            local body = ngx.req.get_body_data()
            if body then
                local cjson = require "cjson"
                local ok, json_body = pcall(cjson.decode, body)
                if ok then
                    if not json_body["model"] or json_body["model"] == cjson.null then
                        json_body["model"] = ngx.var.deployment
                    end
                    -- Merge multiple system messages into one
                    if json_body["messages"] then
                        local system_parts = {}
                        local other_msgs = {}
                        for _, msg in ipairs(json_body["messages"]) do
                            if msg["role"] == "system" then
                                table.insert(system_parts, msg["content"])
                            else
                                table.insert(other_msgs, msg)
                            end
                        end
                        local merged = {}
                        if #system_parts > 0 then
                            table.insert(merged, {
                                role = "system",
                                content = table.concat(system_parts, "\n\n")
                            })
                        end
                        for _, msg in ipairs(other_msgs) do
                            table.insert(merged, msg)
                        end
                        json_body["messages"] = merged
                    end
                    local new_body = cjson.encode(json_body)
                    ngx.req.set_body_data(new_body)
                    ngx.req.set_header("Content-Length", #new_body)
                end
            end
        }
        rewrite ^(/v1)?/openai/deployments/[^/]+/(.*)$ /v1/$2 break;
        proxy_pass http://spark:30000;
        proxy_set_header Host $host;
        proxy_set_header Content-Type "application/json";
        proxy_read_timeout 300s;
    }

    # Vanilla OpenAI: /v1/chat/completions (Mistral SDK, etc.)
    location /v1/chat/completions {
        access_by_lua_block {
            ngx.req.read_body()
            local body = ngx.req.get_body_data()
            if body then
                local cjson = require "cjson"
                local ok, json_body = pcall(cjson.decode, body)
                if ok and json_body["messages"] then
                    local system_parts = {}
                    local other_msgs = {}
                    for _, msg in ipairs(json_body["messages"]) do
                        if msg["role"] == "system" then
                            table.insert(system_parts, msg["content"])
                        else
                            table.insert(other_msgs, msg)
                        end
                    end
                    if #system_parts > 1 then
                        local merged = {}
                        table.insert(merged, {
                            role = "system",
                            content = table.concat(system_parts, "\n\n")
                        })
                        for _, msg in ipairs(other_msgs) do
                            table.insert(merged, msg)
                        end
                        json_body["messages"] = merged
                        local new_body = cjson.encode(json_body)
                        ngx.req.set_body_data(new_body)
                        ngx.req.set_header("Content-Length", #new_body)
                    end
                end
            end
        }
        proxy_pass http://spark:30000;
        proxy_set_header Host $host;
        proxy_set_header Content-Type "application/json";
        proxy_read_timeout 300s;
    }

    # Azure-style embeddings: /openai/deployments/{model}/embeddings
    location ~ ^(/v1)?/openai/deployments/(?<deployment>[^/]+)/embeddings$ {
        access_by_lua_block {
            ngx.req.read_body()
            local body = ngx.req.get_body_data()
            if body then
                local cjson = require "cjson"
                local ok, json_body = pcall(cjson.decode, body)
                if ok then
                    if not json_body["model"] or json_body["model"] == cjson.null then
                        json_body["model"] = ngx.var.deployment
                    end
                    local new_body = cjson.encode(json_body)
                    ngx.req.set_body_data(new_body)
                    ngx.req.set_header("Content-Length", #new_body)
                end
            end
        }
        rewrite ^(/v1)?/openai/deployments/[^/]+/(.*)$ /v1/$2 break;
        proxy_pass http://spark:8889;
        proxy_set_header Host $host;
        proxy_set_header Content-Type "application/json";
        proxy_read_timeout 300s;
    }

    # Pass everything else through
    location / {
        proxy_pass http://spark:30000;
        proxy_set_header Host $host;
        proxy_read_timeout 300s;
    }
}
