volumes:
  alkemio_dev_postgres:
  alkemio_dev_synapse:
  alkemio_dev_storage:
  tmpvolume:
  chroma-data:
  rabbitmq_data:
    driver: local
  alkemio_dev_redis:
  alkemio_dev_backup:

networks:
  alkemio_dev_net:

services:
  traefik:
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    container_name: alkemio_dev_traefik
    image: traefik:v2.11.20
    restart: always
    ports:
      - 8888:8080
      - 8088:8088
      - 8280:8280
      - 3000:80
      - 5432:5432
      - 8008:8008
      - 4436:4436
      - 4437:4437
      - 1025:1025
      - 5672:5672
      - 15672:15672
      - 6379:6379
      - 6060:6060
      - 8188:8188
    networks:
      - alkemio_dev_net
    environment:
      - TZ=Europe/Amsterdam
    volumes:
      - type: bind
        source: ./.build/traefik/
        target: /etc/traefik/

  kratos-migrate:
    container_name: alkemio_dev_kratos_migrate
    image: oryd/kratos:v26.2.0
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - DSN=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/kratos?sslmode=disable&max_conns=20&max_idle_conns=4
    restart: on-failure
    networks:
      - alkemio_dev_net
    volumes:
      - type: bind
        source: ./.build/ory/kratos
        target: /etc/config/kratos
    command: -c /etc/config/kratos/kratos.yml migrate sql -e --yes

  kratos:
    container_name: alkemio_dev_kratos
    image: oryd/kratos:v26.2.0
    depends_on:
      kratos-migrate:
        condition: service_completed_successfully
    ports:
      - 4433
      - 4434
    restart: unless-stopped
    environment:
      - DSN=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/kratos?sslmode=disable&max_conns=20&max_idle_conns=4
      - LOG_LEVEL=trace
    networks:
      - alkemio_dev_net
    volumes:
      - type: bind
        source: ./.build/ory/kratos
        target: /etc/config/kratos
    command: serve -c /etc/config/kratos/kratos.yml --dev --watch-courier

  kratos-admin-ui:
    image: ghcr.io/dfoxg/kratos-admin-ui:v2.5.0
    ports:
      - 8080
    restart: unless-stopped
    environment:
      - KRATOS_ADMIN_URL=http://kratos:4434
      - KRATOS_PUBLIC_URL=http://kratos:4433
    networks:
      - alkemio_dev_net

  hydra-migrate:
    container_name: alkemio_dev_hydra_migrate
    image: oryd/hydra:v26.2.0
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - DSN=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/hydra?sslmode=disable&max_conns=20&max_idle_conns=4
    command: migrate sql -e --yes
    networks:
      - alkemio_dev_net
    restart: on-failure

  hydra:
    container_name: alkemio_dev_hydra
    image: oryd/hydra:v26.2.0
    depends_on:
      hydra-migrate:
        condition: service_completed_successfully
    ports:
      - 4444
      - 4445
    environment:
      - DSN=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/hydra?sslmode=disable&max_conns=20&max_idle_conns=4&max_conn_lifetime=30m&max_conn_idle_time=5m
      - SECRETS_SYSTEM=${HYDRA_SYSTEM_SECRET}
      - URLS_SELF_PUBLIC=${HYDRA_PUBLIC_URL}/
      - URLS_SELF_ISSUER=${HYDRA_PUBLIC_URL}/
      - URLS_LOGIN=${HYDRA_PUBLIC_URL}/oidc/login
      - URLS_CONSENT=${HYDRA_PUBLIC_URL}/oidc/consent
      - URLS_LOGOUT=${HYDRA_PUBLIC_URL}/oidc/logout
      - URLS_SELF_ADMIN=http://hydra:4445/
      - SERVE_PUBLIC_CORS_ENABLED=true
      - SERVE_ADMIN_CORS_ENABLED=true
      - OAUTH2_ALLOWED_TOP_LEVEL_CLAIMS=email,email_verified,given_name,family_name,alkemio_actor_id
      - STRATEGIES_ACCESS_TOKEN=jwt
      # FR-006/006a — Hydra calls oidc-service on every token issuance
      # (auth-code + refresh) to (re)inject `alkemio_actor_id` into the id_token.
      - OAUTH2_TOKEN_HOOK_URL=http://oidc-service:8080/oidc/token-hook
      - LOG_LEVEL=debug
    command: serve all --dev
    networks:
      - alkemio_dev_net
    restart: unless-stopped

  hydra-client-setup:
    container_name: alkemio_dev_hydra_client_setup
    image: curlimages/curl:8.1.2
    depends_on:
      - hydra
    environment:
      - HYDRA_ADMIN_URL=http://hydra:4445
      - SYNAPSE_OIDC_CLIENT_ID
      - SYNAPSE_OIDC_CLIENT_SECRET
      - SYNAPSE_PUBLIC_URL
    networks:
      - alkemio_dev_net
    restart: on-failure
    entrypoint: ['/bin/sh', '-c']
    command:
      - |
        echo "Waiting for Hydra to be ready..."
        until curl -sf $$HYDRA_ADMIN_URL/health/ready > /dev/null 2>&1; do
          echo "Hydra not ready yet, waiting..."
          sleep 2
        done
        echo "Hydra is ready."

        # ---- Synapse OAuth2 client (confidential) ----
        SYNAPSE_BODY="{
          \"client_id\": \"$$SYNAPSE_OIDC_CLIENT_ID\",
          \"client_name\": \"Synapse Matrix Server\",
          \"client_secret\": \"$$SYNAPSE_OIDC_CLIENT_SECRET\",
          \"grant_types\": [\"authorization_code\", \"refresh_token\"],
          \"response_types\": [\"code\"],
          \"redirect_uris\": [\"$$SYNAPSE_PUBLIC_URL/_synapse/client/oidc/callback\"],
          \"scope\": \"openid profile email alkemio\",
          \"token_endpoint_auth_method\": \"client_secret_basic\",
          \"access_token_lifespan\": \"10m\",
          \"refresh_token_lifespan\": \"336h\",
          \"id_token_lifespan\": \"10m\"
        }"
        if curl -sf $$HYDRA_ADMIN_URL/admin/clients/$$SYNAPSE_OIDC_CLIENT_ID > /dev/null 2>&1; then
          echo "Updating Synapse client $$SYNAPSE_OIDC_CLIENT_ID..."
          curl -fsS -X PUT $$HYDRA_ADMIN_URL/admin/clients/$$SYNAPSE_OIDC_CLIENT_ID \
            -H "Content-Type: application/json" -d "$$SYNAPSE_BODY" > /dev/null \
            && echo "Synapse client updated" || { echo "Synapse update FAILED"; exit 1; }
        else
          echo "Registering Synapse client $$SYNAPSE_OIDC_CLIENT_ID..."
          curl -fsS -X POST $$HYDRA_ADMIN_URL/admin/clients \
            -H "Content-Type: application/json" -d "$$SYNAPSE_BODY" > /dev/null \
            && echo "Synapse client registered" || { echo "Synapse register FAILED"; exit 1; }
        fi

        # ---- alkemio-web OAuth2 client (T058 — public, PKCE-S256, BFF) ----
        # FR-007 lifespans match the k8s OAuth2Client CRD in dev-orchestration.
        # Public client (token_endpoint_auth_method=none); BFF holds tokens server-side.
        ALKEMIO_WEB_BODY="{
          \"client_id\": \"alkemio-web\",
          \"client_name\": \"Alkemio Web (BFF)\",
          \"grant_types\": [\"authorization_code\", \"refresh_token\"],
          \"response_types\": [\"code\"],
          \"redirect_uris\": [\"http://localhost:3000/api/auth/oidc/callback\"],
          \"post_logout_redirect_uris\": [\"http://localhost:3000/logout\"],
          \"scope\": \"openid profile email offline_access alkemio\",
          \"audience\": [\"alkemio-web\"],
          \"token_endpoint_auth_method\": \"none\",
          \"access_token_lifespan\": \"10m\",
          \"refresh_token_lifespan\": \"336h\",
          \"id_token_lifespan\": \"10m\"
        }"
        if curl -sf $$HYDRA_ADMIN_URL/admin/clients/alkemio-web > /dev/null 2>&1; then
          echo "Updating alkemio-web client..."
          curl -fsS -X PUT $$HYDRA_ADMIN_URL/admin/clients/alkemio-web \
            -H "Content-Type: application/json" -d "$$ALKEMIO_WEB_BODY" > /dev/null \
            && echo "alkemio-web client updated" || { echo "alkemio-web update FAILED"; exit 1; }
        else
          echo "Registering alkemio-web client..."
          curl -fsS -X POST $$HYDRA_ADMIN_URL/admin/clients \
            -H "Content-Type: application/json" -d "$$ALKEMIO_WEB_BODY" > /dev/null \
            && echo "alkemio-web client registered" || { echo "alkemio-web register FAILED"; exit 1; }
        fi

        # ---- legacy client-web OAuth2 client (optional, env-gated) ----
        if [ -n "$$CLIENT_WEB_OIDC_CLIENT_ID" ] && [ -n "$$CLIENT_WEB_OIDC_CLIENT_SECRET" ] && [ -n "$$CLIENT_WEB_PUBLIC_URL" ]; then
          CLIENT_WEB_BODY="{
            \"client_id\": \"$$CLIENT_WEB_OIDC_CLIENT_ID\",
            \"client_name\": \"Alkemio Client Web\",
            \"client_secret\": \"$$CLIENT_WEB_OIDC_CLIENT_SECRET\",
            \"grant_types\": [\"authorization_code\", \"refresh_token\"],
            \"response_types\": [\"code\"],
            \"redirect_uris\": [\"$$CLIENT_WEB_PUBLIC_URL/oidc/callback\"],
            \"scope\": \"openid profile email\",
            \"token_endpoint_auth_method\": \"client_secret_basic\"
          }"
          if curl -sf $$HYDRA_ADMIN_URL/admin/clients/$$CLIENT_WEB_OIDC_CLIENT_ID > /dev/null 2>&1; then
            echo "Updating client-web client..."
            curl -fsS -X PUT $$HYDRA_ADMIN_URL/admin/clients/$$CLIENT_WEB_OIDC_CLIENT_ID \
              -H "Content-Type: application/json" -d "$$CLIENT_WEB_BODY" > /dev/null \
              && echo "client-web updated" || { echo "client-web update FAILED"; exit 1; }
          else
            echo "Registering client-web client..."
            curl -fsS -X POST $$HYDRA_ADMIN_URL/admin/clients \
              -H "Content-Type: application/json" -d "$$CLIENT_WEB_BODY" > /dev/null \
              && echo "client-web registered" || { echo "client-web register FAILED"; exit 1; }
          fi
        else
          echo "Skipping client-web (CLIENT_WEB_OIDC_CLIENT_ID/SECRET or CLIENT_WEB_PUBLIC_URL not set)"
        fi

        echo "All Hydra OAuth2 clients seeded successfully."

  oidc-service:
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    container_name: alkemio_dev_oidc_service
    image: alkemio/oidc-service:v0.8.0
    depends_on:
      - hydra
      - kratos
    environment:
      - OIDC_ALLOW_INSECURE_HTTP=true
      - OIDC_HYDRA_ADMIN_URL
      - OIDC_KRATOS_ADMIN_URL
      - OIDC_KRATOS_PUBLIC_URL
      - OIDC_KRATOS_BROWSER_URL=http://localhost:3000/ory/kratos/public
      - OIDC_WEB_BASE_URL=http://localhost:3000
      - OIDC_ALKEMIO_SERVER_URL
      - OIDC_ALKEMIO_IDENTITY_RESOLVE_PATH
      - OIDC_PRE_CONSENT_CLIENT_IDS=alkemio-web,synapse-client,element-client,ecosystem-analytics
      - DATABASE_HOST
      - DATABASE_PORT
      - DATABASE_USERNAME
      - DATABASE_PASSWORD
      - DATABASE_NAME=alkemio
    networks:
      - alkemio_dev_net
    ports:
      - 8080
    restart: unless-stopped

  mailslurper:
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    container_name: alkemio_dev_kratos_mailslurper
    image: oryd/mailslurper:latest-smtps
    restart: always
    ports:
      - 4436
      - 4437
      - 1025
    networks:
      - alkemio_dev_net

  synapse:
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    container_name: alkemio_dev_synapse
    image: matrixdotorg/synapse:v1.132.0
    depends_on:
      - postgres
    restart: always
    environment:
      - SYNAPSE_NO_TLS=true
      - SYNAPSE_HOMESERVER_NAME
      - SYNAPSE_SERVER_URL
      - SYNAPSE_SERVER_SHARED_SECRET
      - PYTHONPATH=/data/modules
    networks:
      - alkemio_dev_net
    ports:
      - 8008
    volumes:
      - type: bind
        source: ./.build/synapse
        target: /data
      - type: volume
        source: alkemio_dev_synapse
        target: /data/keys
        read_only: false

  postgres:
    container_name: alkemio_dev_postgres
    image: postgres:17.5
    networks:
      - alkemio_dev_net
    environment:
      - POSTGRES_DB=synapse
      - POSTGRES_USER
      - POSTGRES_PASSWORD
      - POSTGRES_INITDB_ARGS=--encoding=UTF8 --lc-collate=C --lc-ctype=C
      - POSTGRES_MULTIPLE_DATABASES
    entrypoint: ['bash', '/usr/local/bin/entrypoint-wrapper.sh']
    # Forwarded by entrypoint-wrapper.sh to docker-entrypoint.sh as the postgres
    # args. Raise max_connections from the default 100 — this single dev Postgres
    # is shared by server + hydra + kratos + oidc-service + synapse + collab +
    # assistant-service + wopi, and transient bursts exhausted the 100-cap pool
    # (FATAL: sorry, too many clients already / SQLSTATE 53300), which surfaced as
    # a misleading Hydra `invalid_client` ("client does not exist") at OIDC login.
    command: ['postgres', '-c', 'max_connections=200']
    restart: always
    ports:
      - 5432
    volumes:
      - alkemio_dev_postgres:/var/lib/postgresql
      - ./.build/postgres/init-multiple-databases.sh:/docker-entrypoint-initdb.d/init-multiple-databases.sh
      - ./.build/postgres/entrypoint-wrapper.sh:/usr/local/bin/entrypoint-wrapper.sh:ro
    healthcheck:
      test: >
        bash -c "databases=\"$$POSTGRES_DB,$$POSTGRES_MULTIPLE_DATABASES\"; for db in $$(echo \"$$databases\" | tr ',' ' '); do [ -z \"$$db\" ] && continue; pg_isready -U \"$$POSTGRES_USER\" -d \"$$db\" -h localhost || exit 1; done"
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s

  synapse-admin:
    container_name: alkemio_dev_synapse_admin
    hostname: synapse-admin
    image: awesometechnologies/synapse-admin:0.8.1
    restart: always
    networks:
      - alkemio_dev_net
    ports:
      - 80

  rabbitmq:
    container_name: alkemio_dev_rabbitmq
    image: rabbitmq:3.9.13-management
    restart: always
    networks:
      - alkemio_dev_net
    ports:
      - 5672
      - 15672
    environment:
      - RABBITMQ_SECURE_PASSWORD=yes
      - RABBITMQ_DEFAULT_USER=alkemio-admin
      - RABBITMQ_DEFAULT_PASS=alkemio!
    healthcheck:
      test: rabbitmq-diagnostics check_port_connectivity
      interval: 30s
      timeout: 30s
      retries: 10
      start_period: 5s
    volumes:
      - ~/.docker-conf/rabbitmq/data/:/var/lib/rabbitmq/mnesia
      - ~/.docker-conf/rabbitmq/log/:/var/log/rabbitmq
    command:
      [
        'bash',
        '-c',
        'chmod 400 /var/lib/rabbitmq/.erlang.cookie; rabbitmq-server --hostname rmq',
      ]

  notification:
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    container_name: alkemio_dev_notifications
    hostname: notifications
    image: alkemio/notifications:v0.35.0
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      - RABBITMQ_HOST
      - RABBITMQ_USER
      - RABBITMQ_PASSWORD
      - LOGGING_CONSOLE_ENABLED
      - LOGGING_LEVEL_CONSOLE
      - EMAIL_SMTP_HOST
      - EMAIL_MULTI_PROVIDER_STRATEGY
      - EMAIL_SMTP_SECURE
      - EMAIL_SMTP_PORT
      - EMAIL_SMTP_USER
      - EMAIL_SMTP_PASSWORD
      - ENVIRONMENT=dev
      - ALKEMIO_SERVER_ENDPOINT
      - ALKEMIO_WEBCLIENT_ENDPOINT
      - KRATOS_API_PUBLIC_ENDPOINT
      - SERVICE_ACCOUNT_USERNAME
      - SERVICE_ACCOUNT_PASSWORD
      - WAIT_HOSTS=host.docker.internal:3000
      - WAIT_TIMEOUT=300
      - WAIT_SLEEP_INTERVAL=30
      - WAIT_HOST_CONNECT_TIMEOUT=30
      - EMAIL_FROM
      - EMAIL_FROM_NAME
    restart: always
    networks:
      - alkemio_dev_net

  matrix-adapter:
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    container_name: alkemio_dev_matrix_adapter
    hostname: matrix-adapter
    image: alkemio/matrix-adapter:v0.8.17
    depends_on:
      - rabbitmq
    environment:
      - RABBITMQ_HOST
      - RABBITMQ_USER
      - RABBITMQ_PASSWORD
      - SYNAPSE_HOMESERVER_NAME
      - SYNAPSE_SERVER_URL
      - SYNAPSE_SERVER_NAME
      - SYNAPSE_SERVER_SHARED_SECRET
      - MATRIX_AS_TOKEN
      - MATRIX_HS_TOKEN
#      - MATRIX_BOT_ACTOR_ID
      - LOGGING_CONSOLE_ENABLED
      - LOGGING_LEVEL_CONSOLE=debug
      - ENVIRONMENT=dev
      - WAIT_HOSTS=host.docker.internal:3000
      - WAIT_TIMEOUT=300
      - WAIT_SLEEP_INTERVAL=30
      - WAIT_HOST_CONNECT_TIMEOUT=30
      - WAIT_COMMAND=/app/matrix-adapter
      - DATABASE_HOST
      - DATABASE_PORT
      - DATABASE_USERNAME
      - DATABASE_PASSWORD
      - DATABASE_NAME=alkemio
      - ACTOR_ID_MAPPER_ENABLED=false
    restart: always
    networks:
      - alkemio_dev_net
    ports:
      - 8280
    entrypoint: ["/wait"]

  redis:
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    container_name: alkemio_dev_redis
    hostname: redis
    image: redis:7.0.2
    restart: always
    # Mirrors the k8s config (01-redis-configmap.yml): AOF persistence so
    # sessions survive a restart, evict least-recently-used first. Memory cap is
    # kept at 50mb locally (dev has far fewer sessions than the 256mb cluster).
    command:
      - redis-server
      - --appendonly
      - 'yes'
      - --appendfsync
      - everysec
      - --maxmemory
      - 50mb
      - --maxmemory-policy
      - allkeys-lru
      - --dir
      - /data
    networks:
      - alkemio_dev_net
    ports:
      - 6379
    volumes:
      - alkemio_dev_redis:/data

  redis-commander:
    image: ghcr.io/joeferner/redis-commander:latest
    environment:
      - REDIS_HOSTS=local:redis:6379
    ports:
      - 8381:8081
    networks:
      - alkemio_dev_net
    depends_on:
      - redis

  whiteboard-collaboration:
    container_name: alkemio_dev_whiteboard_collaboration
    hostname: whiteboard-collaboration
    # External scene updates (Option A: merge external writes as a collaborator)
    # shipped in v0.12.0 (2026-06-29), superseding the earlier livepush-local build.
    image: alkemio/whiteboard-collaboration-service:v0.12.0
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      - RABBITMQ_HOST
      - RABBITMQ_USER
      - RABBITMQ_PASSWORD
      - LOGGING_CONSOLE_ENABLED
      - LOGGING_LEVEL_CONSOLE
      - ENVIRONMENT=dev
    restart: always
    networks:
      - alkemio_dev_net
    ports:
      - 4002

  file-service:
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    container_name: alkemio_dev_file_service
    hostname: file-service
    image: alkemio/file-service:v0.2.1
    depends_on:
      postgres:
        condition: service_healthy
      authorization-evaluation:
        condition: service_started
    environment:
      - ALKEMIO_DATABASE_HOST=postgres
      - ALKEMIO_DATABASE_PORT=5432
      - ALKEMIO_DATABASE_USERNAME=${POSTGRES_USER}
      - ALKEMIO_DATABASE_PASSWORD=${POSTGRES_PASSWORD}
      - ALKEMIO_DATABASE_NAME=${DATABASE_NAME}
      - AUTH_SERVICE_URL=http://authorization-evaluation:6060
      - LOCAL_STORAGE_PATH=/storage
      - STORAGE_TYPE=local
      # 008-continuous-file-backup: write the backup outbox on every non-temporary object so
      # file-backup-service can replicate it. Consumed by the file-backup-service below.
      # REQUIRES the file_backup_outbox table + scoped role from server migration 1783508955161 —
      # run `pnpm run migration:run` (dev-flow step 2) BEFORE uploading files. Until it is applied,
      # every upload's transactional outbox INSERT fails and the worker below crash-loops on its
      # startup probe (both recover once the migration runs).
      - FILE_BACKUP_OUTBOX_ENABLED=true
      - LOG_LEVEL=info
    restart: always
    volumes:
      - alkemio_dev_storage:/storage
    networks:
      - alkemio_dev_net
    ports:
      - 4003

  # 008-continuous-file-backup — one-shot: apply the ledger DB migrations, then exit. The worker
  # below waits for this to complete (service_completed_successfully).
  file-backup-migrate:
    container_name: alkemio_dev_file_backup_migrate
    image: alkemio/file-backup-service:v0.0.4
    depends_on:
      postgres:
        condition: service_healthy
    # migrate only needs the ledger DB (it applies the ledger schema, then exits).
    environment:
      - FBS_LEDGERDB_HOST=postgres
      - FBS_LEDGERDB_DBNAME=filebackup
      - FBS_LEDGERDB_SSLMODE=disable
      - FBS_LEDGERDB_USER=${POSTGRES_USER}
      - FBS_LEDGERDB_PASSWORD=${POSTGRES_PASSWORD}
    command: ['migrate']
    networks:
      - alkemio_dev_net
    restart: 'no'

  # 008-continuous-file-backup — the backup worker: drains the outbox and replicates every object
  # to the local filesystem target (a Docker volume). Content-addressed by SHA3-256. Configured
  # ENTIRELY from env (12-factor) — no config file. The nonroot image pre-creates /storage owned by
  # 65532 + declares it a VOLUME, so the mounted named volume is writable (same as file-service).
  file-backup-service:
    container_name: alkemio_dev_file_backup_service
    hostname: file-backup-service
    image: alkemio/file-backup-service:v0.0.4
    depends_on:
      postgres:
        condition: service_healthy
      file-service:
        condition: service_started
      file-backup-migrate:
        condition: service_completed_successfully
    environment:
      - FBS_FILESERVICEBASE=http://file-service:4003
      # the outbox lives in the alkemio DB; the ledger in its own DB — both on the shared dev postgres
      - FBS_ALKEMIODB_HOST=postgres
      - FBS_ALKEMIODB_DBNAME=${DATABASE_NAME}
      - FBS_ALKEMIODB_SSLMODE=disable
      - FBS_ALKEMIODB_USER=${POSTGRES_USER}
      - FBS_ALKEMIODB_PASSWORD=${POSTGRES_PASSWORD}
      - FBS_LEDGERDB_HOST=postgres
      - FBS_LEDGERDB_DBNAME=filebackup
      - FBS_LEDGERDB_SSLMODE=disable
      - FBS_LEDGERDB_USER=${POSTGRES_USER}
      - FBS_LEDGERDB_PASSWORD=${POSTGRES_PASSWORD}
      # a single local filesystem target at /storage (a Docker volume)
      - FBS_TARGETS=local
      - FBS_TARGET_LOCAL_TYPE=filesystem
      - FBS_TARGET_LOCAL_PATH=/storage
      - FBS_POLLEVERYSEC=5
      - LOG_LEVEL=info
    command: ['serve']
    restart: always
    volumes:
      - alkemio_dev_backup:/storage
    networks:
      - alkemio_dev_net
    ports:
      - 4004

  kratos-hooks:
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    container_name: alkemio_dev_kratos_hooks
    hostname: kratos-hooks
    image: alkemio/kratos-webhooks:v0.2.3
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      - PORT=8080
      - LOG_LEVEL=info
      - LOG_FORMAT=json
      - REDIS_URL=redis://redis:6379/0
      - RABBITMQ_URL=amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@rabbitmq:5672/
      - PLATFORM_URL=http://host.docker.internal:4000
      - MAINTENANCE_MODE=false
      - CORRELATION_ID_HEADER=X-Request-ID
      - LOGIN_BACKOFF_MAX_IDENTIFIER_ATTEMPTS=10
      - LOGIN_BACKOFF_MAX_IP_ATTEMPTS=20
      - LOGIN_BACKOFF_IDENTIFIER_LOCKOUT_SECONDS=120
      - LOGIN_BACKOFF_IP_LOCKOUT_SECONDS=120
      - KRATOS_INTERNAL_URL=http://kratos:4433
    restart: unless-stopped
    networks:
      - alkemio_dev_net
    ports:
      - 8080

  collaborative-document:
    container_name: alkemio_dev_collaborative-document
    hostname: collaborative-document
    image: alkemio/collaborative-document-service:v0.4.0
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      - RABBITMQ_HOST
      - RABBITMQ_USER
      - RABBITMQ_PASSWORD
      - LOGGING_CONSOLE_ENABLED
      - LOGGING_LEVEL_CONSOLE
      - ENVIRONMENT=dev
    restart: always
    networks:
      - alkemio_dev_net
    ports:
      - 4004

  authorization-evaluation:
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    container_name: alkemio_dev_authorization_evaluation
    hostname: authorization-evaluation
    image: alkemio/authorization-evaluation-service:v0.0.4
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${DATABASE_NAME}?sslmode=disable
      - LOG_LEVEL=info
    restart: unless-stopped
    networks:
      - alkemio_dev_net
    ports:
      - 6060

  wopi-service:
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    container_name: alkemio_dev_wopi_service
    hostname: wopi-service
    image: alkemio/wopi-service:v0.1.4
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      authorization-evaluation:
        condition: service_started
      file-service:
        condition: service_started
    environment:
      - WOPI_DATABASE_HOST=postgres
      - WOPI_DATABASE_PORT=5432
      - WOPI_DATABASE_USERNAME=${POSTGRES_USER}
      - WOPI_DATABASE_PASSWORD=${POSTGRES_PASSWORD}
      - WOPI_DATABASE_NAME=wopi
      - WOPI_DATABASE_TIMEOUT=5s
      - ALKEMIO_DATABASE_HOST=postgres
      - ALKEMIO_DATABASE_PORT=5432
      - ALKEMIO_DATABASE_USERNAME=${POSTGRES_USER}
      - ALKEMIO_DATABASE_PASSWORD=${POSTGRES_PASSWORD}
      - ALKEMIO_DATABASE_NAME=${DATABASE_NAME}
      - AUTH_SERVICE_URL=http://authorization-evaluation:6060
      - FILE_SERVICE_URL=http://file-service:4003
      - WOPI_COLLABORA_URL=http://collabora:9980
      - WOPI_BASE_URL=http://localhost:3000
      # WOPISrc handed to Collabora routes via Traefik's /wopi route so it rides
      # the wopi-service failover (local primary → container fallback), instead
      # of hitting a single instance directly.
      - WOPI_CALLBACK_URL=http://traefik
      - WOPI_TOKEN_SECRET=dev-wopi-token-secret-change-in-production
      - WOPI_SERVER_PORT=8080
      - WOPI_PROOF_VALIDATION=false
      # RabbitMQ — WITHOUT this the publisher is a no-op and every event the WOPI
      # emits (office-document contribution/view AND the in-editor rename event the
      # server consumes to persist a Collabora rename) is silently dropped.
      - RABBITMQ_URL=amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@rabbitmq:5672/
      - LOG_LEVEL=info
    restart: unless-stopped
    networks:
      - alkemio_dev_net
    ports:
      - 8080

  collabora:
    extra_hosts:
      - 'wopi-service:host-gateway'
    container_name: alkemio_dev_collabora
    hostname: collabora
    image: collabora/code:24.04.12.2.1
    environment:
      # Reach wopi through Traefik (not a direct port), so callbacks ride the
      # wopi-service failover. A `wopi-service:host-gateway` extra_host here
      # would shadow the container's Docker DNS name and pin Collabora to the
      # host — exactly what we must avoid.
      - aliasgroup1=http://traefik
      - username=admin
      - password=admin
      - extra_params=--o:ssl.enable=false --o:net.proto=IPv4 --o:security.seccomp=false --o:security.capabilities=false
      - DONT_GEN_SSL_CERT=1
    cap_add:
      - MKNOD
    tmpfs:
      # World-writable (mode=1777) so the non-root 'cool' user can create
      # per-session jails here without CAP_SYS_ADMIN (we run with
      # --o:security.capabilities=false for K8s compatibility, which disables
      # coolmount's bind-mount path).
      - /opt/cool/child-roots:exec,mode=1777,size=512m
    restart: unless-stopped
    networks:
      - alkemio_dev_net
    ports:
      - 9980

  # Headless auth-reset consumer. Same Alkemio image as the API server; the
  # AUTH_RESET_WORKER=true env flips main.ts into worker role (binds only the
  # `alkemio-auth-reset` queue, prefetch=1, no HTTP). The API publisher runs on
  # the host (`pnpm start:dev`) and emits resets that these containers drain.
  #
  # Competing-consumers: scale to N instances that split the queue with no extra
  # config. Hence NO container_name and NO published port (both would collide
  # across replicas). profiles: ['auth-reset'] keeps it OUT of a plain `up` — it
  # boots at 0 and is scaled 0<->N solely by the auth-reset-scaler sidecar below.
  auth-reset-worker:
    profiles: ['auth-reset']
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env.docker
    environment:
      - AUTH_RESET_WORKER=true
      # Graceful-drain budget on SIGTERM (default 55s). Short locally so
      # `compose down` / scale-in returns quickly.
      - AUTH_RESET_DRAIN_TIMEOUT_SECONDS=55
      # .env.docker maps DATABASE_HOST=postgres and RABBITMQ_HOST=rabbitmq, but
      # not REDIS_HOST (defaults to localhost in alkemio.yml — right for the host
      # server via traefik, wrong inside a container). Point it at the service.
      - REDIS_HOST=redis
    # No command override: the image's own CMD (`node dist/main.js`) is correct.
    # In the Docker build only `src` is copied, so tsc's rootDir collapses to
    # `src` and output flattens to dist/main.js. (A host `nest build` instead
    # emits dist/src/main.js because tsconfig `include` also pulls in test/,
    # keeping src/ as a subdir — that layout does NOT exist in the image.)
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_started
    # SIGTERM starts the drain; give it the full budget + margin before SIGKILL.
    stop_grace_period: 60s
    restart: unless-stopped
    networks:
      - alkemio_dev_net

  # Local KEDA analogue. Starts with the base stack (no profile), watches the
  # `alkemio-auth-reset` queue via the RabbitMQ mgmt API, and drives the worker
  # 0<->MAX_REPLICAS through the host Docker socket. Nothing manual: `up` brings
  # this online, it scales the worker up from zero when resets arrive and back to
  # zero once the queue drains. COMPOSE_PROFILES=auth-reset lets it manage the
  # profiled worker; COMPOSE_PROJECT_NAME must match the host stack's project
  # (compose derives it from the repo dir basename, default `server`) so the
  # sidecar targets the SAME containers/network instead of forking a new stack.
  auth-reset-scaler:
    image: docker:27-cli
    working_dir: /workspace
    # RABBITMQ_HOST / RABBITMQ_USER / RABBITMQ_PASSWORD (+ optional
    # RABBITMQ_AUTH_RESET_QUEUE) come straight from .env.docker; the script
    # derives the mgmt URL and creds from them. No credentials duplicated here.
    # .env.docker.local (per-dev, gitignored) layers on top when present.
    env_file:
      - path: .env.docker
        required: true
      - path: .env.docker.local
        required: false
    environment:
      - COMPOSE_PROJECT_NAME=${COMPOSE_PROJECT_NAME:-server}
      - COMPOSE_PROFILES=auth-reset
      - COMPOSE_FILE=quickstart-services.yml
      - ENV_FILE=.env.docker
      - MAX_REPLICAS=${AUTH_RESET_MAX_REPLICAS:-3}
      - INTERVAL=${AUTH_RESET_POLL_INTERVAL:-5}
      - IDLE_ROUNDS=${AUTH_RESET_IDLE_ROUNDS:-3}
    volumes:
      # Host Docker socket => the sidecar drives the same daemon the stack runs on.
      - /var/run/docker.sock:/var/run/docker.sock
      # Repo mount => the compose file, .env.docker, build context, and the
      # autoscale script are all visible at /workspace.
      - .:/workspace
    depends_on:
      rabbitmq:
        condition: service_healthy
    entrypoint: ['/bin/sh', '-c']
    command:
      - 'apk add --no-cache bash jq curl docker-cli-compose >/dev/null && exec bash ./scripts/auth-reset-autoscale.sh'
    restart: unless-stopped
    networks:
      - alkemio_dev_net
