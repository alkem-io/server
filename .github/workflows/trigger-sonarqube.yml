name: SonarQube Analysis

on:
  pull_request:
    branches:
      - develop
      - main
  workflow_dispatch:

jobs:
  sonarqube:
    name: SonarQube Static Analysis
    runs-on: arc-runner-set
    permissions:
      contents: read
      pull-requests: write
      checks: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Shallow clones should be disabled for a better relevancy of analysis

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6.2.0
        with:
          node-version: '22.22.0'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests with coverage
        run: pnpm run test:ci
        continue-on-error: true

      - name: SonarQube Scan
        uses: sonarsource/sonarqube-scan-action@v7
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectBaseDir: .
          args: >
            -Dproject.settings=sonar-project.properties
      # Note: Quality gate check is intentionally not blocking merges
      # Results are advisory only and visible in PR checks
      - name: SonarQube Quality Gate Check
        uses: sonarsource/sonarqube-quality-gate-action@v1
        timeout-minutes: 5
        continue-on-error: true
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      - name: Display Analysis Summary
        if: always()
        run: |
          echo "✓ SonarQube analysis completed"
          echo "View detailed results at: ${{ secrets.SONAR_HOST_URL }}/dashboard?id=alkemio-server"
          echo "Note: Quality gate status is advisory and does not block merges"