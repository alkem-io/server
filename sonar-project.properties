# SonarQube Project Configuration for Alkemio Server
# https://docs.sonarqube.org/latest/analysis/analysis-parameters/

# Project identification
sonar.projectKey=alkem-io_server_d19991f4-3746-4a7e-844c-9d33a88819dc
sonar.projectName=Alkemio Server
sonar.projectVersion=1.0

# Source code location
sonar.sources=src
sonar.tests=test

# TypeScript/JavaScript specific settings
sonar.typescript.lcov.reportPaths=coverage-ci/lcov.info
sonar.javascript.lcov.reportPaths=coverage-ci/lcov.info

# Exclusions
sonar.exclusions=**/node_modules/**, **/dist/**, **/build/**, **/coverage/**, **/coverage-ci/**, **/*.spec.ts, **/*.test.ts
sonar.test.exclusions=**/*.spec.ts, **/*.test.ts

# Coverage exclusions — aligned with vitest coverage.exclude in vitest.config.ts
# Files excluded here are declarative/boilerplate with no testable logic
sonar.coverage.exclusions=\
  **/*.spec.ts, **/*.test.ts, **/*.e2e-spec.ts, **/*.it-spec.ts, \
  **/test/**, **/scripts/**, **/*.config.ts, **/*.config.js, \
  src/types/**, \
  src/**/*.entity.ts, \
  src/**/*.interface.ts, \
  src/**/*.module.ts, \
  src/**/*.dto.ts, \
  src/**/*.dto.*.ts, \
  src/**/*.input.ts, \
  src/**/*.enum.ts, \
  src/**/*.type.ts, \
  src/**/*.types.ts, \
  src/**/*.constants.ts, \
  src/**/index.ts, \
  src/common/exceptions/**, \
  src/common/constants/**, \
  src/common/enums/**, \
  src/migrations/**, \
  src/main.ts, \
  src/app.module.ts, \
  src/app.controller.ts, \
  src/tools/schema/diff-schema.ts, \
  src/tools/schema/sort-sdl.ts, \
  src/tools/schema/print-schema.ts, \
  src/tools/schema/validate-artifacts.ts

# Encoding
sonar.sourceEncoding=UTF-8

# Branch configuration
# The main branch is 'develop' for this repository
sonar.branch.name=${GITHUB_REF_NAME}
sonar.host.url=https://sonarqube.alkem.io
